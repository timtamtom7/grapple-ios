name: GrappleMac
options:
  bundleIdPrefix: com.grapple
  deploymentTarget:
    macOS: "15.0"

targets:
  GrappleMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: ../Sources/Models
      - path: ../Sources/Services
        excludes:
          - "**/DatabaseService.swift"
          - "**/DebateCommunityService.swift"
          - "**/CommunityService.swift"
      - path: ../Sources/ViewModels
        excludes:
          - "**/GrappleViewModel.swift"
          - "**/HistoryViewModel.swift"
          - "**/CommunityViewModel.swift"
      - path: ../Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grapple.macos
        MARKETING_VERSION: "1.0.0"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: GrappleMac
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHighResolutionCapable: YES
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
